<div class="flex flex-col gap-3 justify-start relative max-h-48">
  <div
    (click)="fileInput.click()"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    [ngClass]="{
      'border-blue-500 bg-blue-50': isDragging,
      'border-gray-300 bg-gray-50': !isDragging
    }"
    class="relative w-40 h-40 border-2 border-dashed rounded-lg cursor-pointer hover:bg-gray-300 transition-all flex items-center justify-center overflow-hidden"
  >
    <input
      #fileInput
      type="file"
      accept="image/*"
      class="hidden"
      (change)="onFileSelected($event)"
    />

    @if(imagePreview || image){
    <div class="w-full h-full">
      <img
        [src]="imagePreview ? imagePreview : `data:image/jpg;base64,${image}`"
        class="object-cover w-full h-full"
        alt="Preview"
      />
      <div
        class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity"
      >
        <span class="text-white text-sm font-medium">Changer l'image</span>
      </div>
    </div>
    } @else {
    <div class="text-center p-4">
      <svg
        class="mx-auto h-12 w-12 text-gray-400"
        stroke="currentColor"
        fill="none"
        viewBox="0 0 48 48"
      >
        <path
          d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <p class="mt-2 text-sm text-gray-600">
        <span class="font-semibold text-blue-600">Cliquez</span> ou glissez une
        image ici
      </p>
    </div>
    }
  </div>

  <button
    type="button"
    (click)="uploadImage()"
    [disabled]="!selectedFile || isUploading"
    class="px-6 py-1 w-[180px] bg-blue-600 text-white rounded-full font-medium shadow-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
  >
    {{ isUploading ? "Envoi en cours..." : "Envoyer l'image" }}
  </button>
</div>
