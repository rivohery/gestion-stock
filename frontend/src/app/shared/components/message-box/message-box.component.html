<div
  [ngClass]="{
    'bg-green-50 border-green-400 text-green-800': type === 'success',
    'bg-red-50 border-red-400 text-red-800': type === 'error'
  }"
  class="flex items-start p-4 mb-4 border-l-4 rounded-md shadow-sm transition-all duration-300 ease-in-out"
  role="alert"
>
  <div class="flex-shrink-0">
    <mat-icon
      [ngClass]="{
        'text-green-500': type === 'success',
        'text-red-500': type === 'error'
      }"
      class="w-6 h-6"
    >
      {{ icon }}
    </mat-icon>
  </div>

  <div class="ml-3">
    <h3 class="text-sm font-bold md:text-base" *ngIf="title">
      {{ title }}
    </h3>
    <div class="mt-1 text-sm md:text-sm opacity-90">
      <p>{{ message }}</p>
    </div>
  </div>

  <div class="ml-auto pl-3">
    <button
      type="button"
      class="inline-flex rounded-md p-1.5 focus:outline-none focus:ring-2 focus:ring-offset-2 opacity-50 hover:opacity-100"
      (click)="close()"
    >
      <mat-icon class="text-sm">close</mat-icon>
    </button>
  </div>
</div>
