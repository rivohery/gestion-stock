<mat-card class="flex flex-col gap-8 mat-elevation-z8 w-md mx-auto mt-12">
  <mat-card-header class="border-0 rounded-t-lg">
    <h1 class="text-gray-600 text-2xl font-bold">
      <mat-icon>people</mat-icon>
      Entrer le token
    </h1>
  </mat-card-header>
  <mat-card-content>
    <ng-otp-input
      (onInputChange)="onOtpChange($event)"
      [config]="{ length: 6, allowNumbersOnly: true }"
    >
    </ng-otp-input>
  </mat-card-content>
  <mat-card-actions class="flex items-center justify-center text-gray-600">
    <span *ngIf="authStore.loading()"> Loading... </span>
  </mat-card-actions>
</mat-card>
