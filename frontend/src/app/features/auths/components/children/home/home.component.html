@if(loading()){
<app-loader></app-loader>
} @else {
<app-message-box
  [message]="errorMsg()"
  [type]="'error'"
  (closeEvent)="close()"
  *ngIf="errorMsg()"
></app-message-box>

<div
  class="bg-gray-50 min-h-screen mx-auto flex flex-col justify-start w-full p-5 mt-4"
>
  <div
    class="flex flex-col md:flex-row gap-4 mb-8 items-center justify-between bg-white p-4 rounded-xl shadow-sm"
  >
    <div class="relative w-full md:w-1/3">
      <span
        class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
      >
        <mat-icon>search</mat-icon>
      </span>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (input)="applyFilters()"
        placeholder="Rechercher un produit..."
        class="pl-10 w-full border-gray-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 border"
      />
    </div>

    <div class="flex gap-2">
      <button
        (click)="statusFilter = 'all'; applyFilters()"
        [class.bg-blue-600]="statusFilter === 'all'"
        class="px-4 py-2 rounded-full border text-sm font-medium transition-colors"
      >
        Tous
      </button>
      <button
        (click)="statusFilter = 'available'; applyFilters()"
        [class.bg-green-600]="statusFilter === 'available'"
        class="px-4 py-2 rounded-full border text-sm font-medium transition-colors"
      >
        Disponible
      </button>
      <button
        (click)="statusFilter = 'outOfStock'; applyFilters()"
        [class.bg-red-600]="statusFilter === 'outOfStock'"
        class="px-4 py-2 rounded-full border text-sm font-medium transition-colors"
      >
        Rupture
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <div
      *ngFor="let product of paginatedProducts"
      class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-lg transition-shadow border border-gray-100"
    >
      <div class="relative">
        <img
          [src]="product.photos ? `data:image/jpg;base64,${product.photos}` : '/images/default.png'"
          class="w-full h-48 object-cover"
        />
        <span
          [ngClass]="
            product.isActive
              ? 'bg-green-100 text-green-700'
              : 'bg-red-100 text-red-700'
          "
          class="absolute top-2 right-2 px-2 py-1 rounded text-xs font-bold uppercase"
        >
          {{ product.isActive ? "En Stock" : "Épuisé" }}
        </span>
      </div>

      <div class="p-4">
        <p
          class="text-xs text-blue-600 font-semibold mb-1 uppercase tracking-wider"
        >
          {{ product.categoryName }}
        </p>
        <h3 class="text-lg font-bold text-gray-800 mb-2">{{ product.name }}</h3>
        <div class="flex justify-between items-center">
          <span class="text-xl font-black text-gray-900">{{
            product.salesPrice | currency : "EUR"
          }}</span>
          <button
            class="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
          >
            <mat-icon>visibility</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center mt-10 gap-2">
    <button
      [disabled]="currentPage === 1"
      (click)="currentPage = currentPage - 1"
      class="p-2 border rounded-lg hover:bg-gray-100 disabled:opacity-50"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span class="flex items-center px-4 font-medium text-gray-700">
      Page {{ currentPage }} sur {{ totalPages }}
    </span>
    <button
      [disabled]="currentPage === totalPages"
      (click)="currentPage = currentPage + 1"
      class="p-2 border rounded-lg hover:bg-gray-100 disabled:opacity-50"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
</div>
}
