<form (ngSubmit)="forgotPswdProcess()" class="w-md mx-auto mt-12 p-3">
  <mat-card class="flex-col gap-4 mat-elevation-z8">
    <mat-card-header class="border-0 rounded-t-lg">
      <h1 class="text-gray-600 text-2xl font-bold">
        <mat-icon>people</mat-icon>
        Mots de passe oublié
      </h1>
    </mat-card-header>
    <mat-card-content class="flex flex-col gap-10">
      <mat-form-field class="w-full">
        <mat-label>Email</mat-label>
        <input
          required
          matInput
          placeholder="Entrer votre email"
          [formControl]="emailControl"
        />
        <mat-error *ngIf="emailInvalid">
          <span *ngxControlError="emailControl; track: 'required'"
            >Email est réquis</span
          >
          <span *ngxControlError="emailControl; track: 'email'"
            >Email est invalide</span
          >
        </mat-error>
        <!-- <div *ngIf="username.invalid && username.touched">This username is required</div> -->
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <div class="w-[96%] mx-auto flex">
        <button type="submit" mat-flat-button color="primary" class="w-full">
          <span *ngIf="loading()">Loading...</span>
          <span *ngIf="!loading()">Envoyer</span>
        </button>
      </div>
    </mat-card-actions>
  </mat-card>
</form>
