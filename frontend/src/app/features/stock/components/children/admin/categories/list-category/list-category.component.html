<div class="flex items-center justify-center" *ngIf="categoryStore.loading()">
  <span class="text-gray-500">Loading...</span>
</div>
<div
  class="flex flex-col gap-3"
  *ngIf="categories && categories.length; else noCategory"
>
  @for(category of categories;track category.id){
  <mat-card class="py-2 px-3 mat-elevation-z8">
    <div class="flex items-center justify-between">
      <span class="text-gray-600">{{ category.reference }}</span>
      <span class="text-gray-600">{{ category.name }}</span>
      <button mat-icon-button color="primary" (click)="onEdit(category)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="accent" (click)="onDelete(category)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card>
  }
</div>
<ng-template #noCategory>
  <div class="flex items-center justify-center">
    <p class="text-gray-500">No category registred</p>
  </div>
</ng-template>
