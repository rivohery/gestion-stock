<div class="flex flex-col gap-5">
  <app-search (searchEvent)="doSearch($event)"></app-search>
  <div class="flex flex-col gap-4">
    <div class="flex items-center justify-end">
      <button
        mat-flat-button
        color="primary"
        class="flex items-center justify-center gap-2"
        (click)="addSupplier()"
      >
        <mat-icon>add</mat-icon>
        <span>Nouveau fournisseur</span>
      </button>
    </div>

    <app-message-box
      *ngIf="errorMsg()"
      [type]="'error'"
      [message]="errorMsg()"
      (closeEvent)="close()"
    ></app-message-box>

    <div class="flex flex-col gap-3" *ngIf="suppliers.length; else noSupplier">
      @for(supplier of suppliers;track supplier.id){
      <div
        class="w-full flex items-center justify-between p-2 border border-gray-300 rounded-lg shadow-d"
      >
        <div class="flex items-center gap-2 text-gray-600">
          <mat-icon>person</mat-icon>
          {{ supplier.name }}
        </div>
        <div class="flex flex-col gap-3 text-gray-600">
          <span class="flex items-center gap-2">
            <mat-icon>email</mat-icon>
            {{ supplier.email }}
          </span>
          <span class="flex items-center gap-2">
            <mat-icon>phone</mat-icon>
            {{ supplier.phoneNu }}
          </span>
          <span class="flex items-center gap-2">
            <mat-icon>home</mat-icon>
            {{ supplier.address }}
          </span>
        </div>
        <div class="flex items-center justify-center">
          <button mat-icon-button color="primary" (click)="onEdit(supplier)">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
        <div class="flex items-center justify-center">
          <button
            mat-icon-button
            color="accent"
            (click)="onDelete(supplier)"
            [disabled]="supplier.id === deletingId"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
      }
      <div class="flex items-center justify-center">
        <app-pagination
          [totalPages]="totalPages"
          [currentPage]="currentPage"
          (pageChanged)="goToPage($event)"
        ></app-pagination>
      </div>
    </div>
    <ng-template #noSupplier>
      <div class="text-gray-500">No supplier registered</div>
    </ng-template>
  </div>
</div>
