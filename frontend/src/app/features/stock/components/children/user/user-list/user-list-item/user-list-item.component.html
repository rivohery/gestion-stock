<mat-card class="w-full py-1 px-3" *ngIf="userDetails">
  <div class="flex items-center justify-between">
    <div class="flex items-center justify-start gap-3 p-2">
      <img
        [src]="profile ? profile : '/images/avatar.png'"
        class="w-18 h-18 rounded-full border-none"
      />
      <div class="flex flex-col gap-3">
        <span
          class="font-semibold text-gray-700 flex items-center justify-start gap-3"
        >
          <mat-icon>person</mat-icon>
          {{ userDetails.fullName }}
        </span>
        <span
          class="font-semibold text-gray-500 flex items-center justify-start gap-3"
        >
          <mat-icon>phone</mat-icon>
          {{ userDetails.phoneNu }}
        </span>
        <span class="text-gray-600 flex items-center justify-start gap-3">
          <mat-icon>admin_panel_settings</mat-icon>
          {{ userDetails.role }}
        </span>
      </div>
    </div>
    <div class="flex items-center justify-center">
      @if(userDetails.enabled){
      <span class="text-green-600">Active</span>
      }@else {
      <span class="text-red-500">Désactive</span>
      }
    </div>
    @if(!userDetails.role.includes('ADMIN')){
    <div class="flex items-center justify-center">
      <button mat-icon-button color="primary" (click)="onEdit(userDetails)">
        <mat-icon>edit</mat-icon>
      </button>
    </div>
    <div
      class="flex items-center justify-center"
      (click)="onDelete(userDetails.userId)"
    >
      <button mat-icon-button color="accent">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
    }
  </div>
</mat-card>
